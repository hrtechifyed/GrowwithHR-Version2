name: Run v0.18.0 Cut

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cut-v0.18.0-runner.yml"
      - "scripts/cut-v0.18.0.mjs"

permissions:
  contents: write

concurrency:
  group: run-cut-v0.18.0
  cancel-in-progress: false

jobs:
  cut:
    if: github.head_ref == 'release/v0.18.0'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.18.0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify release baseline
        run: |
          test "$(node -p "require('./package.json').version")" = "0.16.0-beta"
          test "$(git branch --show-current)" = "release/v0.18.0"

      - name: Install dependencies
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Prepare release metadata
        run: node scripts/cut-v0.18.0.mjs

      - name: Synchronize visible version labels
        run: npm run version:sync

      - name: Run complete maintained validation
        run: |
          npm run version:check
          npm run validate:compliance
          npm test
          git diff --check

      - name: Install Playwright and Chromium
        run: |
          npm install --no-save --package-lock=false --no-audit --no-fund @playwright/test
          npx playwright install --with-deps chromium

      - name: Run stable, M1, M2 and M3 browser checks
        run: >
          npx playwright test
          tests/e2e/executive-assessment-modules.spec.ts
          tests/e2e/analyze-company-current.spec.ts
          tests/e2e/analyze-company-v3.spec.ts
          tests/e2e/analyze-company-v3-traceability.spec.ts
          tests/e2e/analyze-company-v3-compliance-story.spec.ts
          --project=chromium

      - name: Verify release change set
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(git diff --name-only)
          for file in "${files[@]}"; do
            case "$file" in
              package.json|js/config/app-config.js|tests/baseline-contract-checks.js|tests/requirements-static-check.js|ROADMAP.md|CHANGELOG.md|docs/releases/v0.18.0-m3-compliance-story.md|*.html) ;;
              *) echo "Unexpected release change: $file"; exit 1 ;;
            esac
          done
          test "$(node -p "require('./package.json').version")" = "0.18.0"
          grep -q 'version: "0.18.0"' js/config/app-config.js
          grep -q 'GrowWithHR Public 0.18.0' index.html
          grep -q 'GrowWithHR Public 0.18.0' analyze-company-v3.html
          grep -q '\*\*Status:\*\* Complete and validated' ROADMAP.md
          grep -q '## \[v0.18.0\]' CHANGELOG.md

      - name: Commit validated release cut
        run: |
          rm .github/workflows/cut-v0.18.0.yml
          rm .github/workflows/cut-v0.18.0-runner.yml
          rm scripts/cut-v0.18.0.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "release: cut v0.18.0"
          git push origin HEAD:release/v0.18.0
