name: Client Readiness Deep Audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install --no-audit --no-fund

      - name: Classify historical environment files without exposing values
        shell: bash
        run: |
          mkdir -p deep-audit
          python3 - <<'PY'
          from __future__ import annotations
          import hashlib
          import json
          import re
          import subprocess
          from pathlib import Path

          def git(*args):
              return subprocess.check_output(['git', *args], text=True, stderr=subprocess.DEVNULL)

          commits = git('rev-list', '--all', '--', '.env').splitlines()
          placeholder_markers = {
              '', 'changeme', 'change-me', 'your-value', 'your_value',
              'replace-me', 'replace_me', 'example', 'placeholder',
              'your-email@example.com', 'your_email@example.com'
          }
          result = []
          for commit in commits:
              try:
                  text = git('show', f'{commit}:.env')
              except subprocess.CalledProcessError:
                  continue
              keys = []
              potentially_real = []
              for line in text.splitlines():
                  line = line.strip()
                  if not line or line.startswith('#') or '=' not in line:
                      continue
                  key, value = line.split('=', 1)
                  key = key.strip()
                  value = value.strip().strip('"\'')
                  normalized = value.lower()
                  placeholder = (
                      normalized in placeholder_markers or
                      normalized.startswith('your_') or
                      normalized.startswith('your-') or
                      normalized.startswith('<') or
                      normalized.endswith('_here') or
                      normalized.endswith('-here')
                  )
                  keys.append({
                      'name': key,
                      'present': bool(value),
                      'lengthBand': '0' if not value else ('1-8' if len(value) <= 8 else ('9-24' if len(value) <= 24 else '25+')),
                      'placeholderLike': placeholder,
                      'fingerprint': hashlib.sha256(value.encode()).hexdigest()[:8] if value else None
                  })
                  if value and not placeholder:
                      potentially_real.append(key)
              result.append({
                  'commit': commit,
                  'keys': keys,
                  'potentiallyRealValueKeys': sorted(potentially_real)
              })

          patterns = {
              'githubToken': re.compile(r'gh[pousr]_[A-Za-z0-9]{20,}'),
              'googleApiKey': re.compile(r'AIza[0-9A-Za-z_-]{20,}'),
              'googleOAuthSecret': re.compile(r'GOCSPX-[0-9A-Za-z_-]{10,}'),
              'googleRefreshToken': re.compile(r'1//[0-9A-Za-z_-]{20,}'),
              'privateKey': re.compile(r'-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----')
          }
          matches = []
          for commit in git('rev-list', '--all').splitlines():
              try:
                  names = git('diff-tree', '--no-commit-id', '--name-only', '-r', commit).splitlines()
              except subprocess.CalledProcessError:
                  continue
              for name in names:
                  if name.endswith(('.png','.jpg','.jpeg','.gif','.pdf','.zip','.woff','.woff2','.ttf','.ico')):
                      continue
                  try:
                      text = git('show', f'{commit}:{name}')
                  except (subprocess.CalledProcessError, UnicodeDecodeError):
                      continue
                  found = [label for label, pattern in patterns.items() if pattern.search(text)]
                  if found:
                      matches.append({'commit': commit, 'path': name, 'patternClasses': found})

          Path('deep-audit/secret-history-classification.json').write_text(
              json.dumps({'environmentHistory': result, 'highConfidencePatternMatches': matches}, indent=2) + '\n'
          )
          PY

      - name: Record repository and Markdown inventory
        shell: bash
        run: |
          {
            echo 'Root files:'
            find . -maxdepth 1 -type f -printf '%f\n' | sort
            echo
            echo 'Markdown files:'
            find . -type f -name '*.md' \
              -not -path './node_modules/*' \
              -not -path './.git/*' \
              -printf '%P\n' | sort
            echo
            echo 'References to assessment.html:'
            git grep -n 'assessment\.html' -- ':!node_modules' || true
            echo
            echo 'References to intro-sequence.js:'
            git grep -n 'intro-sequence\.js' -- ':!node_modules' || true
            echo
            echo 'References to backupstyles.css:'
            git grep -n 'backupstyles\.css' -- ':!node_modules' || true
          } > deep-audit/inventory.txt

      - name: Install Playwright browser
        run: |
          npm install --no-save --no-audit --no-fund @playwright/test
          npx playwright install --with-deps chromium

      - name: Inspect carousel geometry and storage writes
        shell: bash
        run: |
          cat > tests/e2e/client-readiness-deep.temp.spec.ts <<'EOF'
          import { test } from '@playwright/test';
          import fs from 'node:fs';

          test('record focused browser diagnostics', async ({ page }) => {
            const results: Record<string, unknown> = {};
            const consoleProblems: string[] = [];
            page.on('console', message => {
              if (['warning', 'error'].includes(message.type())) {
                consoleProblems.push(`${message.type()}: ${message.text()}`);
              }
            });
            page.on('pageerror', error => consoleProblems.push(`pageerror: ${error.message}`));

            await page.goto('/index.html', { waitUntil: 'networkidle' });
            results.carousel = await page.evaluate(() => {
              const carousel = document.querySelector('.capability-carousel') as HTMLElement | null;
              const track = document.querySelector('.carousel-track') as HTMLElement | null;
              const previous = document.querySelector('.carousel-arrow.prev') as HTMLElement | null;
              const next = document.querySelector('.carousel-arrow.next') as HTMLElement | null;
              const slides = Array.from(document.querySelectorAll('.capability-slide')) as HTMLElement[];
              const describe = (element: HTMLElement | null) => {
                if (!element) return null;
                const rect = element.getBoundingClientRect();
                const style = getComputedStyle(element);
                return {
                  rect: { x: rect.x, y: rect.y, width: rect.width, height: rect.height },
                  display: style.display,
                  visibility: style.visibility,
                  opacity: style.opacity,
                  position: style.position,
                  overflow: style.overflow,
                  clientWidth: element.clientWidth,
                  scrollWidth: element.scrollWidth,
                  scrollLeft: element.scrollLeft
                };
              };
              const before = track?.scrollLeft ?? null;
              next?.click();
              return {
                viewport: { width: innerWidth, height: innerHeight },
                carousel: describe(carousel),
                track: describe(track),
                previous: describe(previous),
                next: describe(next),
                slideCount: slides.length,
                activeIndexes: slides.map((slide, index) => slide.classList.contains('active') ? index : -1).filter(index => index >= 0),
                before
              };
            });
            await page.waitForTimeout(900);
            results.carouselAfterProgrammaticClick = await page.evaluate(() => {
              const track = document.querySelector('.carousel-track') as HTMLElement | null;
              const slides = Array.from(document.querySelectorAll('.capability-slide')) as HTMLElement[];
              return {
                scrollLeft: track?.scrollLeft ?? null,
                activeIndexes: slides.map((slide, index) => slide.classList.contains('active') ? index : -1).filter(index => index >= 0)
              };
            });

            await page.context().clearCookies();
            await page.goto('/analyze-company.html', { waitUntil: 'networkidle' });
            results.assessmentStorage = await page.evaluate(() => {
              const values: Record<string, unknown> = {};
              for (let index = 0; index < localStorage.length; index += 1) {
                const key = localStorage.key(index);
                if (!key) continue;
                const value = localStorage.getItem(key) || '';
                values[key] = { length: value.length, jsonLike: value.trim().startsWith('{') || value.trim().startsWith('[') };
              }
              return values;
            });
            results.assessmentControllerCount = await page.evaluate(() => ({
              hasGlobal: Boolean((window as any).executiveAssessment),
              constructorName: (window as any).executiveAssessment?.constructor?.name || null
            }));
            results.consoleProblems = consoleProblems;
            fs.mkdirSync('deep-audit', { recursive: true });
            fs.writeFileSync('deep-audit/browser-diagnostics.json', JSON.stringify(results, null, 2) + '\n');
          });
          EOF
          cat > playwright.deep.config.ts <<'EOF'
          import { defineConfig } from '@playwright/test';
          export default defineConfig({
            testDir: './tests/e2e',
            timeout: 40_000,
            reporter: [['list']],
            use: { baseURL: 'http://127.0.0.1:4173', viewport: { width: 1280, height: 720 } },
            webServer: { command: 'python3 -m http.server 4173', url: 'http://127.0.0.1:4173', reuseExistingServer: false }
          });
          EOF
          npx playwright test tests/e2e/client-readiness-deep.temp.spec.ts --config=playwright.deep.config.ts
          rm -f tests/e2e/client-readiness-deep.temp.spec.ts playwright.deep.config.ts

      - name: Upload focused audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-readiness-deep-audit
          path: deep-audit/
          if-no-files-found: error
          retention-days: 7
