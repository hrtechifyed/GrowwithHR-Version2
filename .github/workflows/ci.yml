name: GrowWithHR CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "release/**"
      - "hotfix/**"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality checks
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check version consistency
        run: npm run version:check

      - name: Validate compliance data
        run: npm run validate:compliance

      - name: Run baseline contracts
        shell: bash
        run: |
          set -o pipefail
          npm run test:baseline 2>&1 | tee baseline-contract-output.log

      - name: Upload baseline failure output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-contract-output
          path: baseline-contract-output.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Run M1 architecture contracts
        run: npm run test:m1

      - name: Run M2 architecture contracts
        run: npm run test:m2

      - name: Run M3 architecture contracts
        run: npm run test:m3

      - name: Run client and server readiness checks
        run: >
          npm run test:client-readiness &&
          npm run test:server-cors

      - name: Run presentation checks
        run: npm run test:presentation

      - name: Run report experience checks
        run: npm run test:report-experience

      - name: Run journey and scenario regression checks
        run: >
          npm run test:static &&
          npm run test:frontend &&
          npm run test:journeys &&
          npm run test:input-combinations &&
          npm run test:report-scenarios &&
          npm run test:golden

      - name: Run archived UX compatibility checks
        run: npm run test:ux
