name: Executive Assessment Tests

on:
  workflow_dispatch:
  push:
    paths:
      - "index.html"
      - "app.js"
      - "sample-advisory-report.html"
      - "executive-advisory-report.html"
      - "analyze-company.html"
      - "analyze-company-v3.html"
      - "assets/hrtechify-logo-transparent.svg"
      - "css/16-homepage-refresh.css"
      - "css/17-advisory-briefing.css"
      - "css/19-compliance-dna.css"
      - "css/19-presentation-polish.css"
      - "css/20-compliance-story.css"
      - "data/assessment/**"
      - "data/schema/**"
      - "js/config/app-config.js"
      - "js/executive-assessment.js"
      - "js/executive-assessment/**"
      - "js/assessment-v3/**"
      - "js/build-marker.js"
      - "js/pdf.js"
      - "js/pdf-polish.js"
      - "js/gmail-service.js"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - ".github/workflows/executive-assessment-tests.yml"

  pull_request:
    paths:
      - "index.html"
      - "app.js"
      - "sample-advisory-report.html"
      - "executive-advisory-report.html"
      - "analyze-company.html"
      - "analyze-company-v3.html"
      - "assets/hrtechify-logo-transparent.svg"
      - "css/16-homepage-refresh.css"
      - "css/17-advisory-briefing.css"
      - "css/19-compliance-dna.css"
      - "css/19-presentation-polish.css"
      - "css/20-compliance-story.css"
      - "data/assessment/**"
      - "data/schema/**"
      - "js/config/app-config.js"
      - "js/executive-assessment.js"
      - "js/executive-assessment/**"
      - "js/assessment-v3/**"
      - "js/build-marker.js"
      - "js/pdf.js"
      - "js/pdf-polish.js"
      - "js/gmail-service.js"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - ".github/workflows/executive-assessment-tests.yml"

permissions:
  contents: read

concurrency:
  group: executive-assessment-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Playwright assessment tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright test package
        run: npm install --no-save --no-audit --no-fund @playwright/test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run assessment, report and homepage browser tests
        run: >
          npx playwright test
          tests/e2e/executive-assessment-modules.spec.ts
          tests/e2e/assessment-first-scene.spec.ts
          tests/e2e/analyze-company-current.spec.ts
          tests/e2e/analyze-company-v3.spec.ts
          tests/e2e/analyze-company-v3-traceability.spec.ts
          tests/e2e/analyze-company-v3-compliance-story.spec.ts
          tests/e2e/homepage-client-readiness.spec.ts
          tests/e2e/presentation-polish.spec.ts
          --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assessment-playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: assessment-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
